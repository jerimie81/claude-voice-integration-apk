# claude-voice configuration
# Location: $PREFIX/etc/claude-voice.conf
# Edit this file after installing the package.
#
# Changes take effect immediately — no restart needed.

# ── Mode ─────────────────────────────────────────────────────────────────────
# relay : forward queries via HTTP to a PC running claude_webhook_server.py
# local : run `claude -p` directly inside Termux (requires claude CLI in PATH)
CLAUDE_VOICE_MODE=relay

# ── Relay mode settings (ignored when MODE=local) ─────────────────────────────
# PC's LAN IP address. Find it with `ip addr` or `hostname -I` on the PC.
CLAUDE_VOICE_PC_IP=

# Port the Flask server listens on (default: 5000)
CLAUDE_VOICE_PC_PORT=5000

# Curl timeout in seconds for relay requests
CLAUDE_VOICE_TIMEOUT=30

# ── Logging ───────────────────────────────────────────────────────────────────
# Log file path (relative to $HOME)
CLAUDE_VOICE_LOG=$HOME/.claude-voice.log

# Set to 1 to print log lines to stderr as they happen (useful for debugging)
CLAUDE_VOICE_VERBOSE=0
