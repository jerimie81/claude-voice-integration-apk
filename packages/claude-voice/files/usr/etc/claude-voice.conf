# claude-voice configuration
# Location: $PREFIX/etc/claude-voice.conf
# Edit this file after installing the package.
#
# Changes take effect immediately — no restart needed.

# ── Mode ─────────────────────────────────────────────────────────────────────
# relay : forward queries via HTTP to a PC running claude_webhook_server.py
# local : run `claude -p` directly inside Termux (requires claude CLI in PATH)
CLAUDE_VOICE_MODE=relay

# ── Relay mode settings (ignored when MODE=local) ─────────────────────────────
# PC's address as seen from this device.
#
# Default 10.7.0.1 is the WireGuard tunnel endpoint configured by install.sh
# on the PC. The tunnel is provided by the WireGuard Android app (F-Droid /
# Play Store), which routes 10.7.0.0/24 to the PC over UDP/51820. This works
# from LAN, cellular, and foreign Wi-Fi as long as the WG tunnel is up.
#
# To bypass the tunnel and talk to the PC's LAN IP directly, change this to
# the LAN IP (e.g. 192.168.2.50). You will also need to change the PC server bind host from 10.7.0.1
# to 0.0.0.0 — see pc_server/claude-voice-server.service.
CLAUDE_VOICE_PC_IP=10.7.0.1

# Port the Flask server listens on (default: 5000)
CLAUDE_VOICE_PC_PORT=5000

# Bearer token sent in Authorization header. install.sh on the PC generates
# this and prints it at the end of setup. Paste the same value here.
# Empty = no auth header sent (only works if the PC server also has no token).
CLAUDE_VOICE_TOKEN=

# Curl timeout in seconds for relay requests
CLAUDE_VOICE_TIMEOUT=30

# ── Logging ───────────────────────────────────────────────────────────────────
# Log file path (relative to $HOME)
CLAUDE_VOICE_LOG=$HOME/.claude-voice.log

# Set to 1 to print log lines to stderr as they happen (useful for debugging)
CLAUDE_VOICE_VERBOSE=0
