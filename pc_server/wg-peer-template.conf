# claude-voice WireGuard peer config — phone side
#
# install.sh on the PC fills in @@PLACEHOLDER@@ values and prints the resulting
# config (plus a QR code) so you can import it into the WireGuard Android app
# in one shot. Do NOT commit a filled-in copy — the PrivateKey is a secret.
#
# Topology:
#   PC      wg0  10.7.0.1/24   ListenPort=51820
#   Phone   wg0  10.7.0.2/32
#   AllowedIPs is set to the WG subnet only so traffic to the public internet
#   keeps using cellular/Wi-Fi (split tunnel — saves battery and avoids
#   routing all your phone traffic through your home connection).

[Interface]
PrivateKey = @@PHONE_PRIVATE_KEY@@
Address    = 10.7.0.2/32

[Peer]
PublicKey           = @@PC_PUBLIC_KEY@@
Endpoint            = @@PC_ENDPOINT@@:51820
AllowedIPs          = 10.7.0.0/24
PersistentKeepalive = 25
